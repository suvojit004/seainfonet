services:
  app:
    build: .
    
    expose:
      - "3000"
    restart: unless-stopped
    environment:
      - NODE_ENV=production
    volumes: 
      - .:/app #for Development
    networks:
      - app-network
    command: ["npm", "run", "dev"] #For development 

  nginx:
    image: nginx:stable-alpine
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./Public:/usr/share/nginx/html:ro
    depends_on:
      - app
    networks:
      - app-network

networks:
  app-network: